  <script>
    try {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register = function(){ return Promise.resolve(null); };
        navigator.serviceWorker.getRegistrations().then(function(registrations){
          return Promise.all(registrations.map(function(registration){ return registration.unregister(); }));
        }).catch(function(){});
      }
      if ('caches' in window) caches.keys().then(function(keys){ return Promise.all(keys.map(function(key){ return caches.delete(key); })); }).catch(function(){});
    } catch (error) {}
  </script>
