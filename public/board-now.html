<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#17402b">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <title>Arborwise OS Board</title>
  <link rel="stylesheet" href="/app.css?board=26">
  <style>
    header{min-height:178px;padding-top:10px}
    header .logo{display:block;width:min(300px,68vw);height:90px;object-fit:contain;margin:0 auto 2px}
  </style>
  <script>
    try {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register = function(){ return Promise.resolve(null); };
        navigator.serviceWorker.getRegistrations().then(function(registrations){
          return Promise.all(registrations.map(function(registration){ return registration.unregister(); }));
        }).catch(function(){});
      }
      if ('caches' in window) caches.keys().then(function(keys){ return Promise.all(keys.map(function(key){ return caches.delete(key); })); }).catch(function(){});
    } catch (error) {}
  </script>
</head>
<body>
<header>
  <button id="syncButton" class="sync" type="button" aria-label="Refresh Arborwise operations board">
    <span class="syncIcon">↻</span><span>REFRESH</span>
  </button>
  <img class="logo" src="/assets/arborwise-logo.png?board=26" alt="Arborwise — Nurture Your Nature">
  <div id="dateLine" class="dateLine"></div>
  <button id="statusButton" class="status" type="button">LOADING CURRENT OPERATIONS</button>
</header>
<section id="filters" class="filters" aria-label="Employee and crew filters"></section>
<main id="main">
  <div class="title"><span>Opening current operations</span></div>
  <div class="empty">Loading jobs, estimates, people, equipment, and schedule...</div>
</main>
<button id="addButton" class="add" type="button" aria-label="Add item">+</button>
<button id="annieButton" class="annie" type="button" aria-label="Ask Annie"><img src="/assets/annie-main-icon.png?board=26" alt="Annie"></button>
<div id="annieBubble" class="bubble" hidden></div>
<nav id="tabs" aria-label="Arborwise sections"></nav>
<div id="veil" class="veil" hidden><section id="sheet" class="sheet" role="dialog" aria-modal="true"></section></div>
<div id="toast" class="toast" hidden></div>
<script src="/board-live.js?board=26" defer></script>
<script src="/board-workflow-26.js?board=26" defer></script>
</body>
</html>
