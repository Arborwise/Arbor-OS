<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1d4b34">
  <meta name="application-name" content="Arborwise OS">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <title>Arborwise OS Board</title>
  <link rel="manifest" href="/board-manifest.webmanifest?v=54">
  <link rel="icon" type="image/svg+xml" href="/assets/annie-launcher-v42.svg">
  <link rel="apple-touch-icon" href="/assets/annie-launcher-v42.svg">
  <link rel="stylesheet" href="/app.css?board=54">
  <link rel="stylesheet" href="/annie-bubble-30.css?board=54">
  <style>
    html,body{background:#f7f2e8}
    body.booting{visibility:hidden}
    header{min-height:238px;padding-top:10px}
    header .logo{display:block;width:min(300px,68vw);height:90px;object-fit:contain;margin:0 auto 0}
    .annie{left:8px;bottom:83px}
  </style>
  <link rel="stylesheet" href="/arborwise-personality-49.css?board=54">
  <noscript><style>body.booting{visibility:visible}</style></noscript>
  <script>
    try {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register = function(){ return Promise.resolve(null); };
        navigator.serviceWorker.getRegistrations().then(function(registrations){
          return Promise.all(registrations.map(function(registration){ return registration.unregister(); }));
        }).catch(function(){});
      }
      if ('caches' in window) caches.keys().then(function(keys){ return Promise.all(keys.map(function(key){ return caches.delete(key); })); }).catch(function(){});
    } catch (error) {}
  </script>
</head>
<body class="booting">
<header>
  <button id="syncButton" class="sync" type="button" aria-label="Refresh Arborwise operations from Google Sheets">
    <span class="syncIcon">↻</span><span>REFRESH</span>
  </button>
  <div id="weatherChip" class="weatherChip" role="status" aria-live="polite" aria-label="Loading Van Alstyne weather">WX …</div>
  <img class="logo" src="/assets/arborwise-logo.png?board=54" alt="Arborwise">
  <div class="brandTagline" aria-label="Arborwise motto">NURTURE YOUR NATURE</div>
  <div id="dateLine" class="dateLine"></div>
  <button id="statusButton" class="status" type="button">OPENING PROTECTED SHEET</button>
  <div id="operationsVoice" class="operationsVoice" aria-live="polite">Reading the current Arborwise operation...</div>
</header>
<section id="filters" class="filters" aria-label="Crew filters"></section>
<main id="main">
  <div class="title"><span>Opening current operations</span></div>
  <div class="empty">Customer and financial data load only after authorized access.</div>
</main>
<button id="addButton" class="add" type="button" hidden aria-hidden="true"></button>
<button id="annieButton" class="annie" type="button" aria-label="Ask Annie"><img src="/assets/annie-main-icon.png?board=54" alt="Annie"></button>
<div id="annieBubble" class="bubble" hidden></div>
<nav id="tabs" aria-label="Arborwise sections"></nav>
<div id="veil" class="veil" hidden><section id="sheet" class="sheet" role="dialog" aria-modal="true"></section></div>
<div id="toast" class="toast" hidden></div>
<script src="/board-live-54.js?board=54" defer></script>
<script src="/annie-bubble-48.js?board=54" defer></script>
<script src="/weather-chip-48.js?board=54" defer></script>

</html>
