<style>
:root{
  --green:#17402B; --green-deep:#0F2E1E; --amber:#F59F0A; --orange:#E4590C;
  --paper:#F6F5F0; --ink:#1B241E; --muted:#6B7168; --line:#E2E0D6; --card:#FFFFFF;
  --done:#9AA396;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Barlow',system-ui,sans-serif;font-size:16px;}
body{padding-bottom:calc(76px + env(safe-area-inset-bottom));}
.disp{font-family:'Barlow Condensed','Barlow',sans-serif;}
header{background:var(--green);color:#fff;padding:10px 14px 12px;position:relative;}
.syncbtn{position:absolute;left:12px;top:14px;width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.08);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;}
.brand{display:flex;flex-direction:column;align-items:center;gap:2px;}
#logoImg{width:min(310px,82vw);height:auto;max-height:178px;object-fit:contain;display:none;filter:drop-shadow(0 2px 2px rgba(0,0,0,.2));}
.wordmark{font-family:'Barlow Condensed';font-weight:700;font-size:30px;letter-spacing:2.5px;line-height:1;}
.wordmark small{font-size:12px;letter-spacing:5px;font-weight:600;color:var(--amber);display:block;text-align:center;margin-top:2px;}
.hdate{font-family:'Barlow Condensed';font-weight:500;font-size:15px;letter-spacing:1.5px;color:#D7DFD8;margin-top:4px;text-transform:uppercase;}
.filterWrap{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#fbfaf5 0%,var(--paper) 100%);border-bottom:1px solid var(--line);box-shadow:0 3px 12px rgba(15,46,30,.06);}
.filters{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:7px;padding:10px 10px 8px;max-width:640px;margin:0 auto;}
.fchip{min-width:0;height:42px;font-family:'Barlow Condensed';font-weight:700;font-size:14px;letter-spacing:1px;padding:6px 4px;border-radius:999px;border:1.5px solid var(--green);background:#fff;color:var(--green);white-space:nowrap;box-shadow:0 2px 6px rgba(23,64,43,.08);}
.fchip.on{background:linear-gradient(135deg,var(--green),#225f3f);color:#fff;box-shadow:0 5px 14px rgba(23,64,43,.22);transform:translateY(-1px);}
.subfilters{display:none;grid-template-columns:repeat(3,1fr);gap:7px;padding:0 10px 10px;max-width:640px;margin:0 auto;}
.subfilters.show{display:grid;}
.subchip{height:36px;border-radius:10px;border:1.5px solid var(--amber);background:#fff8e8;color:#754c00;font-family:'Barlow Condensed';font-weight:700;font-size:13px;letter-spacing:1px;}
.subchip.on{background:linear-gradient(135deg,var(--amber),#ffc34d);color:#3c2900;box-shadow:0 4px 10px rgba(245,159,10,.22);}
main{padding:12px 12px 8px;max-width:640px;margin:0 auto;}
.secTitle{font-family:'Barlow Condensed';font-weight:700;font-size:20px;letter-spacing:2px;color:var(--green);margin:16px 2px 8px;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.secTitle .count{font-size:13px;background:var(--green);color:#fff;border-radius:999px;padding:2px 9px;letter-spacing:1px;}
.empty{background:#EFEEE6;border:1.5px dashed #C9C7BA;border-radius:12px;padding:18px 14px;color:var(--muted);font-size:15px;text-align:center;margin:8px 0;}
.card{background:var(--card);border-radius:12px;border:1px solid var(--line);box-shadow:0 1px 3px rgba(23,64,43,.08);margin:10px 0;position:relative;overflow:hidden;padding:12px 14px 12px 18px;}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--amber);}
.card.job::before{background:var(--green);}
.card.closed{opacity:.62;}
.card.closed::before{background:var(--done);}
.tagrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.tag{font-family:'Barlow Condensed';font-weight:700;font-size:12px;letter-spacing:1.5px;padding:2px 8px;border-radius:4px;color:#fff;}
.tag.est{background:var(--amber);color:#3A2A00;}
.tag.job{background:var(--green);}
.recno{font-family:'Barlow Condensed';font-weight:600;font-size:14px;letter-spacing:1px;color:var(--muted);}
.cname{font-family:'Barlow Condensed';font-weight:700;font-size:23px;line-height:1.05;color:var(--ink);}
.when{font-family:'Barlow Condensed';font-weight:600;font-size:16px;letter-spacing:.5px;color:var(--green);margin-top:3px;}
.when .time{color:var(--orange);font-weight:700;}
.addr a{color:var(--green);text-decoration:underline;text-decoration-color:rgba(23,64,43,.35);font-weight:500;font-size:15px;}
.desc{font-size:15px;line-height:1.42;margin-top:7px;white-space:pre-wrap;}
.notes{font-size:13.5px;line-height:1.4;margin-top:6px;color:var(--muted);}
.chiprow{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;align-items:center;}
.chip{font-family:'Barlow Condensed';font-weight:600;font-size:13.5px;letter-spacing:1px;padding:3px 11px;border-radius:999px;border:1.5px solid;}
.chip.status{border-color:var(--orange);color:var(--orange);}
.chip.status.good{border-color:var(--green);color:var(--green);}
.chip.status.done{border-color:var(--done);color:var(--done);}
.chip.who{border-color:var(--amber);color:#8A5B00;background:#FFF6E3;}
.actions{display:flex;gap:10px;margin-top:10px;}
.abtn{width:42px;height:42px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.abtn svg{width:20px;height:20px;fill:#fff;}
.money{font-family:'Barlow Condensed';font-weight:700;font-size:17px;color:var(--green);margin-top:4px;}
nav{position:fixed;left:0;right:0;bottom:0;background:var(--green-deep);display:flex;overflow-x:auto;scrollbar-width:none;padding-bottom:env(safe-area-inset-bottom);z-index:60;}
nav::-webkit-scrollbar{display:none;}
.tab{flex:1 0 58px;min-width:58px;padding:9px 2px 8px;text-align:center;color:#9DB3A4;border:none;background:none;font-family:'Barlow Condensed';font-weight:600;font-size:10.5px;letter-spacing:.55px;}
.tab svg{width:22px;height:22px;fill:currentColor;display:block;margin:0 auto 2px;}
.tab.on{color:var(--amber);}
#addBtn{position:fixed;right:16px;bottom:calc(86px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;background:var(--orange);color:#fff;font-size:30px;border:none;box-shadow:0 3px 8px rgba(0,0,0,.3);z-index:55;line-height:1;}
#micBtn{position:fixed;left:16px;bottom:calc(86px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;background:var(--amber);color:#302000;border:none;box-shadow:0 3px 8px rgba(0,0,0,.3);z-index:55;display:flex;align-items:center;justify-content:center;}
#micBtn svg{width:27px;height:27px;fill:currentColor;}
#micBtn.listening{animation:micPulse 1s ease-in-out infinite;background:#fff;color:var(--orange);outline:4px solid rgba(245,159,10,.35);}
@keyframes micPulse{50%{transform:scale(1.1)}}
.hourCard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:9px 0;box-shadow:0 1px 3px rgba(23,64,43,.08)}
.hourTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.hourName{font-family:'Barlow Condensed';font-size:21px;font-weight:700;color:var(--green)}.hourAmount{font-family:'Barlow Condensed';font-size:22px;font-weight:700;color:var(--orange);white-space:nowrap}.hourMeta{font-size:14px;color:var(--muted);margin-top:3px}.hourStatus{display:inline-block;margin-top:7px;border:1px solid var(--green);border-radius:999px;padding:2px 9px;font-family:'Barlow Condensed';font-weight:700;font-size:12px;color:var(--green)}
.voiceBox{background:#fff7df;border:1.5px solid var(--amber);border-radius:11px;padding:10px 12px;margin-bottom:12px;font-size:14px;line-height:1.4}.voiceBox b{font-family:'Barlow Condensed';letter-spacing:1px;color:#6d4700}
#annie{position:fixed;right:7px;bottom:calc(142px + env(safe-area-inset-bottom));z-index:54;width:94px;height:94px;border:none;background:transparent;border-radius:0;box-shadow:none;display:flex;align-items:center;justify-content:center;padding:0;overflow:visible;}
#annieImg{width:100%;height:100%;object-fit:contain;display:none;filter:drop-shadow(0 4px 5px rgba(0,0,0,.28));}
#annieFallback{font-family:'Barlow Condensed';font-weight:700;font-size:15px;letter-spacing:1px;color:#3A2A00;}
#bubble{position:fixed;right:18px;bottom:calc(232px + env(safe-area-inset-bottom));max-width:250px;background:#fff;border:2px solid var(--green);border-radius:14px;padding:10px 13px;font-size:14.5px;line-height:1.35;z-index:54;box-shadow:0 3px 10px rgba(0,0,0,.18);display:none;}
#bubble::after{content:"";position:absolute;bottom:-9px;right:24px;border-width:9px 8px 0;border-style:solid;border-color:var(--green) transparent transparent;}
#veil{position:fixed;inset:0;background:rgba(15,46,30,.55);z-index:80;display:none;align-items:flex-end;}
#sheet{background:var(--paper);border-radius:18px 18px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:16px 16px calc(20px + env(safe-area-inset-bottom));}
#sheet h3{font-family:'Barlow Condensed';font-weight:700;font-size:22px;letter-spacing:1.5px;color:var(--green);margin:0 0 12px;text-transform:uppercase;}
.frow{margin-bottom:11px;}
.frow label{display:block;font-family:'Barlow Condensed';font-weight:600;font-size:13.5px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.frow input,.frow select,.frow textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-family:'Barlow';font-size:16px;background:#fff;color:var(--ink);}
.frow textarea{min-height:84px;}
.btnrow{display:flex;gap:10px;margin-top:14px;}
.btn{flex:1;padding:13px;border-radius:12px;border:none;font-family:'Barlow Condensed';font-weight:700;font-size:17px;letter-spacing:1.5px;}
.btn.save{background:var(--green);color:#fff;}
.btn.cancel{background:#E5E3D8;color:var(--ink);}
.btn.danger{background:#fff;color:#B3261E;border:1.5px solid #B3261E;flex:0 0 auto;padding:13px 16px;}
.notebox{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:10px 0;}
.notebox h4{font-family:'Barlow Condensed';font-weight:700;font-size:18px;letter-spacing:1.5px;color:var(--green);margin:0 0 8px;text-transform:uppercase;}
.noteentry{border-top:1px solid var(--line);padding:8px 0;font-size:15px;white-space:pre-wrap;}
.noteentry .ts{font-size:12px;color:var(--muted);display:block;margin-top:3px;}
.noteform{display:flex;gap:8px;margin-top:8px;}
.noteform textarea{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;font-family:'Barlow';font-size:15px;min-height:44px;}
.noteform button{background:var(--green);color:#fff;border:none;border-radius:10px;padding:0 16px;font-family:'Barlow Condensed';font-weight:700;font-size:15px;letter-spacing:1px;}
.stat{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 16px;margin:4px 6px 4px 0;text-align:center;}
.stat b{display:block;font-family:'Barlow Condensed';font-weight:700;font-size:24px;color:var(--green);}
.stat span{font-family:'Barlow Condensed';font-size:12.5px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + env(safe-area-inset-bottom));background:var(--green);color:#fff;padding:10px 18px;border-radius:999px;font-family:'Barlow Condensed';font-weight:600;letter-spacing:1px;z-index:90;display:none;}

.fleetSwitch{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:6px 0 14px;}
.fleetBtn{border:1.5px solid var(--green);border-radius:12px;background:#fff;color:var(--green);padding:11px 8px;font-family:'Barlow Condensed';font-weight:700;font-size:16px;letter-spacing:1.2px;}
.fleetBtn.on{background:var(--green);color:#fff;box-shadow:0 4px 12px rgba(23,64,43,.2);}
.maintIntro{background:#fff8e8;border:1px solid #ead39a;border-radius:12px;padding:12px 14px;font-size:14px;line-height:1.4;margin:8px 0 14px;}
.maintCard{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin:10px 0;box-shadow:0 1px 4px rgba(23,64,43,.08);}
.maintTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
.maintName{font-family:'Barlow Condensed';font-size:21px;line-height:1.05;font-weight:700;color:var(--ink);}
.maintId{font-family:'Barlow Condensed';font-weight:700;font-size:12px;letter-spacing:1px;color:var(--muted);}
.due{font-family:'Barlow Condensed';font-weight:700;font-size:13px;letter-spacing:.7px;color:var(--orange);text-align:right;}
.maintTask{font-size:14px;line-height:1.42;color:var(--muted);margin-top:7px;}
.maintActions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:11px;}
.maintBtn{min-height:42px;border-radius:10px;border:1.5px solid var(--green);background:#fff;color:var(--green);font-family:'Barlow Condensed';font-weight:700;font-size:12px;letter-spacing:.7px;padding:7px 4px;text-align:center;display:flex;align-items:center;justify-content:center;}
.maintBtn.done{background:var(--green);color:#fff;}
.maintBtn.verify{border-color:var(--amber);color:#865600;}
.maintBtn.verify.done{background:var(--amber);color:#3d2900;}
.maintBtn.photo{border-color:var(--orange);color:var(--orange);cursor:pointer;}
.maintBtn.photo.done{background:var(--orange);color:#fff;}
.maintPhoto{display:block;width:100%;max-height:190px;object-fit:cover;border-radius:10px;margin-top:10px;border:1px solid var(--line);}
.groupTitle{font-family:'Barlow Condensed';font-weight:700;font-size:17px;letter-spacing:1.5px;color:var(--green);margin:20px 2px 6px;text-transform:uppercase;}


.connCard{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin:10px 0;box-shadow:0 1px 4px rgba(23,64,43,.08)}
.connTop{display:flex;justify-content:space-between;gap:10px;align-items:center}.connName{font-family:'Barlow Condensed';font-weight:700;font-size:21px;color:var(--green);letter-spacing:.8px}.connState{font-family:'Barlow Condensed';font-weight:700;font-size:12px;letter-spacing:.8px;padding:5px 8px;border-radius:999px;background:#eee;color:#555}.connState.good{background:#dcefe3;color:#17402b}.connState.warn{background:#fff0c8;color:#7a4c00}.connHelp{font-size:13px;line-height:1.4;color:var(--muted);margin:8px 0 10px}.connBtn{width:100%;min-height:44px;border:0;border-radius:10px;background:var(--green);color:#fff;font-family:'Barlow Condensed';font-weight:700;font-size:15px;letter-spacing:1px}.connBtn.secondary{background:#fff;color:var(--green);border:1.5px solid var(--green)}
#syncStatus{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}

@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style>

async function api(path,options={}){
  const r=await fetch(path,{credentials:"same-origin",headers:{"Content-Type":"application/json",...(options.headers||{})},...options});
  let data={};try{data=await r.json();}catch{}
  if(!r.ok){const e=new Error(data.error||("Request failed "+r.status));e.status=r.status;throw e;}return data;
}
function connectionBadge(p){if(p?.authorized)return '<span class="connState good">CONNECTED</span>';if(p?.configured)return '<span class="connState warn">ONE-TIME APPROVAL NEEDED</span>';return '<span class="connState warn">APP SETUP NEEDED</span>';}
async function loadConnections(){try{CONNECTIONS=await api('/api/connections');return CONNECTIONS;}catch(e){if(e.status===401)return null;throw e;}}
function updateSyncStatus(lastSync){
  const s=document.getElementById('syncStatus');
  const qb=CONNECTIONS?.quickbooks?.authorized?'QB CONNECTED':CONNECTIONS?.quickbooks?.configured?'QB APPROVAL NEEDED':'QB APP SETUP NEEDED';
  const g=CONNECTIONS?.google?.authorized?'GOOGLE CONNECTED':CONNECTIONS?.google?.configured?'GOOGLE APPROVAL NEEDED':'GOOGLE APP SETUP NEEDED';
  if(lastSync){s.textContent='LAST SYNC '+new Date(lastSync.finished_at||lastSync.started_at).toLocaleString()+' • '+qb+' • '+g;}
  else{s.textContent=qb+' • '+g+' • TAP FOR DETAILS';}
}
function openConnections(c=CONNECTIONS){
  if(!c){toast('Connection status is not available yet');return;}
  const qb=c.quickbooks||{},g=c.google||{};
  const qbHelp=qb.authorized?'QuickBooks is authorized inside Arborwise OS and live synchronization is available.':qb.configured?'The Arborwise OS Intuit settings are present. Tap below once to approve the company. Connecting QuickBooks to ChatGPT does not connect this separate app.':'QuickBooks is connected to ChatGPT, but Arborwise OS still needs its own Intuit app credentials: QBO_CLIENT_ID and QBO_CLIENT_SECRET in Vercel, followed by one approval inside this Connections screen.';
  const gHelp=g.authorized?('Google is authorized as '+esc(g.email||'the Arborwise account')+'.'):g.configured?'The Google app settings are present. Tap below to approve Sheets, Gmail and Calendar.':'Add GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in Vercel Environment Variables when you are ready to connect Google.';
  sheetEl.innerHTML='<h3>Connections</h3>'
   +'<div class="connCard"><div class="connTop"><div class="connName">QUICKBOOKS</div>'+connectionBadge(qb)+'</div><div class="connHelp">'+esc(qbHelp)+'</div>'+(qb.configured?'<button class="connBtn" id="conn-qb">'+(qb.authorized?'RECONNECT QUICKBOOKS':'CONNECT QUICKBOOKS')+'</button>':'')+'</div>'
   +'<div class="connCard"><div class="connTop"><div class="connName">GOOGLE</div>'+connectionBadge(g)+'</div><div class="connHelp">'+esc(gHelp)+'</div>'+(g.configured?'<button class="connBtn secondary" id="conn-google">'+(g.authorized?'RECONNECT GOOGLE':'CONNECT GOOGLE')+'</button>':'')+'</div>'
   +((qb.authorized||g.authorized)?'<button class="btn save" id="conn-sync" style="width:100%;margin-top:8px">SYNC AVAILABLE SOURCES NOW</button>':'')
   +'<button class="btn cancel" id="conn-close" style="width:100%;margin-top:8px">CLOSE</button>';
  veil.style.display='flex';
  const q=document.getElementById('conn-qb');if(q)q.onclick=()=>location.assign('/api/oauth/quickbooks/start');
  const gg=document.getElementById('conn-google');if(gg)gg.onclick=()=>location.assign('/api/oauth/google/start');
  const sy=document.getElementById('conn-sync');if(sy)sy.onclick=async()=>{closeSheet();await runManualSync(true);};
  document.getElementById('conn-close').onclick=closeSheet;
}
async function ensureSetup(){if(SETUP_ATTEMPTED)return;SETUP_ATTEMPTED=true;await api('/api/setup',{method:'POST'});}
function showLogin(){
  sheetEl.innerHTML='<h3>Arborwise OS Login</h3><div class="frow"><label>Shared PIN</label><input id="login-pin" type="password" inputmode="numeric" autocomplete="current-password"></div><div class="btnrow"><button class="btn save" id="login-go">OPEN ARBORWISE OS</button></div>';
  veil.style.display='flex';
  document.getElementById('login-go').onclick=async()=>{try{await api('/api/login',{method:'POST',body:JSON.stringify({pin:document.getElementById('login-pin').value})});closeSheet();await ensureSetup();await loadLive(true);}catch(e){toast(e.message)}};
}
async function loadLive(showErrors=false){
  try{
    let data=await api('/api/data');
    if(data.setupRequired&&!SETUP_ATTEMPTED){await ensureSetup();data=await api('/api/data');}
    LIVE_SEED=data.items||[];LIVE_INBOX=data.inbox||[];LIVE_CONNECTED=true;
    db.mileage=(data.mileage||[]).map(x=>({date:String(x.trip_date||'').slice(0,10),from:x.origin,to:x.destination,miles:x.miles,why:x.purpose}));
    db.hours=(data.hours||[]).map(x=>({id:x.id,date:String(x.work_date||'').slice(0,10),employee:x.employee,job:x.job_ref||'',start:String(x.start_time||'').slice(0,5),end:String(x.end_time||'').slice(0,5),breakMinutes:Number(x.break_minutes||0),hours:Number(x.hours_worked||0),notes:x.notes||'',status:x.status||'Submitted'}));
    db.notesGreg=(data.notes||[]).filter(x=>x.lane==='notesGreg').map(x=>({t:x.body,ts:new Date(x.created_at).toLocaleString()}));
    db.notesBrandon=(data.notes||[]).filter(x=>x.lane==='notesBrandon').map(x=>({t:x.body,ts:new Date(x.created_at).toLocaleString()}));
    if(data.equipment?.length){EQUIPMENT.splice(0,EQUIPMENT.length,...data.equipment.map(e=>({id:e.id,name:e.name,type:e.group_name,task:e.task,fuel:e.fuel_filter_due?String(e.fuel_filter_due).slice(0,10):''})));}
    (data.maintenance||[]).forEach(x=>{db.maintenance[x.equipment_id]={week:String(x.week_of).slice(0,10),checked:x.crew_checked,verified:x.verified,photo:x.photo_data||''}});
    await loadConnections();updateSyncStatus(data.lastSync);
    buildItems();render();return true;
  }catch(e){
    LIVE_CONNECTED=false;document.getElementById('syncStatus').textContent=e.status===401?'LOGIN REQUIRED':'SERVER ERROR';
    if(e.status===401)showLogin();else if(showErrors)toast(e.message);return false;
  }
}
async function serverSaveRecord(record,method='POST'){if(!LIVE_CONNECTED)return;await api('/api/records',{method,body:JSON.stringify(record)});}

async function loadDB(){
  try{
    let raw="";
    if(window.storage){
      const r=await window.storage.get(STORE_KEY);
      raw=r&&r.value?r.value:"";
    }else{
      raw=localStorage.getItem(STORE_KEY)||"";
    }
    if(raw)db=Object.assign(db,JSON.parse(raw));
  }catch(e){}
  db.maintenance=db.maintenance||{};
  db.equipmentAdded=db.equipmentAdded||[];
  db.hours=db.hours||[];
  buildItems(); render(); await loadLive(false);
}
async function saveDB(){
  try{
    const raw=JSON.stringify(db);
    if(window.storage)await window.storage.set(STORE_KEY,raw);
    else localStorage.setItem(STORE_KEY,raw);
  }catch(e){toast("Save failed, try again");}
}
function buildItems(){
  items=LIVE_SEED.filter(s=>!db.removed.includes(s.id)).map(s=>Object.assign({},s,db.overrides[s.id]||{}));
  db.added.forEach(a=>{if(!db.removed.includes(a.id))items.push(Object.assign({},a,db.overrides[a.id]||{}));});
}
const fmtLong=d=>d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
function iso(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');}
function niceDate(s){if(!s)return"";const p=s.split("-");const d=new Date(p[0],p[1]-1,p[2]);return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function esc(t){return String(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function isDone(s){return /completed|paid|done|declined/i.test(s||"");}
function whoTeam(w){ if(/toby|office/i.test(w||""))return"Greg"; return w||""; }
function itemText(it){return [it.id,it.name,it.addr,it.email,it.service,it.desc,it.notes,it.status].join(" ").toLowerCase();}
function belongsTo(it,group){
  const t=itemText(it);
  if(group==="SBB")return /sbbmanagement|sbb management|\bsbb\b/.test(t);
  if(group==="GOODWIN")return /goodwin/.test(t);
  if(group==="KANAM")return /kanam/.test(t);
  if(group==="KW")return /kw landscaping|landscap|mow|edg(e|ing)|weed|lawn|shrub|mulch|irrigat/.test(t);
  if(group==="PMGS")return belongsTo(it,"SBB")||belongsTo(it,"GOODWIN")||belongsTo(it,"KANAM");
  return false;
}
function passFilter(it){
  if(filter==="ALL")return true;
  if(["KW","PMGS","GOODWIN","SBB","KANAM"].includes(filter))return belongsTo(it,filter);
  return whoTeam(it.who)===filter;
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2200);}

function nextFriday(){
  const d=new Date();
  const add=(5-d.getDay()+7)%7;
  d.setDate(d.getDate()+add);
  d.setHours(0,0,0,0);
  return d;
}
function fridayKey(){return iso(nextFriday());}
function maintenanceState(id){
  db.maintenance=db.maintenance||{};
  return db.maintenance[id]||{};
}

function card(it,ctx){
  const done=it.closed||isDone(it.status);
  const mapURL="https://maps.google.com/?q="+encodeURIComponent(it.addr||"");
  let when="";
  if(ctx==="fu"&&it.fuDate){when='<div class="when">FOLLOW UP '+esc(niceDate(it.fuDate).toUpperCase())+(it.fuWhy?' <span style="color:var(--muted);font-weight:500">\u2022 '+esc(it.fuWhy)+'</span>':'')+'</div>';}
  else if(it.date){when='<div class="when">'+esc(niceDate(it.date).toUpperCase())+(it.time?' <span class="time">'+esc(it.time)+'</span>':'')+'</div>';}
  else if(it.fuDate){when='<div class="when">FOLLOW UP '+esc(niceDate(it.fuDate).toUpperCase())+'</div>';}
  const statusClass=done?"done":(/scheduled|approved|in progress/i.test(it.status)?"good":"");
  let acts="";
  if(it.phone){const cleanPhone=esc(it.phone.replace(/[^0-9+]/g,''));acts+='<a class="abtn" href="tel:'+cleanPhone+'" aria-label="Call">'+ICON.phone+'</a>';acts+='<a class="abtn" href="sms:'+cleanPhone+'" aria-label="Text">'+ICON.text+'</a>';}
  if(it.email)acts+='<a class="abtn" href="mailto:'+esc(it.email)+'" aria-label="Email">'+ICON.mail+'</a>';
  if(it.addr)acts+='<a class="abtn" href="'+mapURL+'" target="_blank" rel="noopener" aria-label="Map">'+ICON.pin+'</a>';
  return '<div class="card '+(it.type==="job"?"job":"est")+(done?" closed":"")+'" data-id="'+esc(it.id)+'">'
   +'<div class="tagrow"><span class="tag '+(it.type==="job"?"job":"est")+'">'+(it.type==="job"?"JOB":"ESTIMATE")+'</span><span class="recno">'+esc(it.id)+'</span></div>'
   +'<div class="cname">'+esc(it.name)+'</div>'
   +when
   +(it.addr?'<div class="addr"><a href="'+mapURL+'" target="_blank" rel="noopener">'+esc(it.addr)+'</a></div>':'')
   +(it.money?'<div class="money">'+esc(it.money)+'</div>':'')
   +'<div class="desc">'+esc(it.service)+(it.desc?"\n"+esc(it.desc):"")+'</div>'
   +(it.notes?'<div class="notes">'+esc(it.notes)+'</div>':'')
   +'<div class="chiprow"><span class="chip status '+statusClass+'">'+esc(it.status)+'</span>'+(it.who?'<span class="chip who">'+esc(it.who)+'</span>':'')+'</div>'
   +'<div class="actions">'+acts+'</div></div>';
}
function list(arr,ctx){return arr.length?arr.map(i=>card(i,ctx)).join(""):'<div class="empty">Nothing here. Tap + to add.</div>';}
function sortByDate(a,b){const da=a.date||a.fuDate||"9999",dbb=b.date||b.fuDate||"9999";return da<dbb?-1:da>dbb?1:0;}
function renderToday(){
  const t=new Date(), tm=new Date(Date.now()+86400000);
  const ti=iso(t), tmi=iso(tm);
  const vis=items.filter(passFilter);
  const todayJobs=vis.filter(i=>i.date===ti&&!i.closed);
  const todayFU=vis.filter(i=>i.fuDate===ti&&!i.closed&&i.date!==ti);
  const inProg=vis.filter(i=>/in progress/i.test(i.status)&&!i.closed&&i.date!==ti);
  const tomJobs=vis.filter(i=>i.date===tmi&&!i.closed);
  const tomFU=vis.filter(i=>i.fuDate===tmi&&!i.closed&&i.date!==tmi);
  let h='<div class="secTitle">Today \u2022 '+fmtLong(t)+'</div>';
  const todayAll=[...todayJobs.sort(sortByDate),...inProg,...todayFU];
  h+=todayAll.length?todayAll.map(i=>card(i,i.fuDate===ti&&i.date!==ti?"fu":"")).join(""):'<div class="empty">Nothing on the board today.</div>';
  h+='<div class="secTitle">Tomorrow \u2022 '+fmtLong(tm)+'</div>';
  const tomAll=[...tomJobs.sort(sortByDate),...tomFU];
  h+=tomAll.length?tomAll.map(i=>card(i,i.fuDate===tmi&&i.date!==tmi?"fu":"")).join(""):'<div class="empty">Nothing scheduled tomorrow.</div>';
  return h;
}
function renderMaster(){

function weekStart(d=new Date()){
  const x=new Date(d);const day=x.getDay();const diff=(day===0?-6:1-day);x.setDate(x.getDate()+diff);x.setHours(0,0,0,0);return x;
}
function renderHours(){
  const rows=(db.hours||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')||Number(b.id||0)-Number(a.id||0));
  const start=iso(weekStart()),endDate=new Date(weekStart());endDate.setDate(endDate.getDate()+6);const end=iso(endDate);
  const weekly=rows.filter(x=>x.date>=start&&x.date<=end);
  const total=weekly.reduce((sum,x)=>sum+(Number(x.hours)||0),0);
  const byEmployee={};weekly.forEach(x=>byEmployee[x.employee]=(byEmployee[x.employee]||0)+(Number(x.hours)||0));
  let h='<div class="secTitle">Hours <span class="count">'+rows.length+'</span></div>'
    +'<div><span class="stat"><b>'+total.toFixed(2)+'</b><span>Hours this week</span></span>'
    +'<span class="stat"><b>'+Object.keys(byEmployee).length+'</b><span>Employees</span></span></div>';
  if(Object.keys(byEmployee).length){h+='<div class="notebox"><h4>This week by employee</h4>'+Object.entries(byEmployee).sort((a,b)=>b[1]-a[1]).map(([name,v])=>'<div class="noteentry"><b>'+esc(name)+'</b> — '+v.toFixed(2)+' hours</div>').join('')+'</div>';}
  h+=rows.length?rows.map(x=>'<div class="hourCard"><div class="hourTop"><div><div class="hourName">'+esc(x.employee)+'</div><div class="hourMeta">'+esc(niceDate(x.date).toUpperCase())+(x.start||x.end?' • '+esc(x.start||'?')+'–'+esc(x.end||'?'):'')+(x.job?' • '+esc(x.job):'')+'</div></div><div class="hourAmount">'+Number(x.hours||0).toFixed(2)+' HRS</div></div>'+(x.notes?'<div class="notes">'+esc(x.notes)+'</div>':'')+'<span class="hourStatus">'+esc(x.status||'Submitted')+'</span></div>').join(''):'<div class="empty">No hours entered. Tap + on this screen to add time.</div>';
  return h;
}

function renderMaintenance(){
  const key=fridayKey();
  const all=equipmentList();
  const checked=all.filter(e=>{const s=maintenanceState(e.id);return s.week===key&&s.checked;}).length;
  const verified=all.filter(e=>{const s=maintenanceState(e.id);return s.week===key&&s.verified;}).length;
  let h='<div class="secTitle">Equipment Maintenance</div>'
   +'<div class="maintIntro"><b>THE ARBORWISE WAY:</b> Check every Friday. Crew checks the equipment and takes a photo. Brandon verifies it. No guesswork and no shortcuts.</div>'
   +'<div><span class="stat"><b>'+(all.length-checked)+'</b><span>Still due</span></span>'
   +'<span class="stat"><b>'+checked+'</b><span>Crew checked</span></span>'
   +'<span class="stat"><b>'+verified+'</b><span>Verified</span></span></div>';

  ["Vehicles & Trailers","Saws & Power Tools","Climbing & Rigging"].forEach(group=>{
    const groupItems=all.filter(e=>e.type===group);
    if(!groupItems.length)return;
    h+='<div class="groupTitle">'+esc(group)+'</div>';
    h+=groupItems.map(e=>{
      const s=maintenanceState(e.id);
      const thisWeek=s.week===key;
      const crew=thisWeek&&s.checked;
      const verified=thisWeek&&s.verified;
      const photo=thisWeek&&s.photo;
      return '<div class="maintCard">'
       +'<div class="maintTop"><div><div class="maintId">'+esc(e.id)+' • '+esc(e.type)+'</div><div class="maintName">'+esc(e.name)+'</div></div>'
       +'<div class="due">FRIDAY CHECK<br>'+esc(niceDate(key).toUpperCase())+(e.fuel?'<br><span style="color:var(--muted)">FUEL FILTER '+esc(niceDate(e.fuel).toUpperCase())+'</span>':'')+'</div></div>'
       +'<div class="maintTask">'+esc(e.task)+'</div>'
       +(photo?'<img class="maintPhoto" src="'+photo+'" alt="Maintenance photo for '+esc(e.name)+'">':'')
       +'<div class="maintActions">'
       +'<button class="maintBtn '+(crew?'done':'')+'" onclick="toggleMaint(\''+esc(e.id)+'\',\'checked\')">'+(crew?'✓ CREW CHECKED':'CREW CHECK')+'</button>'
       +'<button class="maintBtn verify '+(verified?'done':'')+'" onclick="toggleMaint(\''+esc(e.id)+'\',\'verified\')">'+(verified?'✓ VERIFIED':'BRANDON VERIFY')+'</button>'
       +'<label class="maintBtn photo '+(photo?'done':'')+'">'+(photo?'✓ PHOTO':'ADD PHOTO')+'<input type="file" accept="image/*" capture="environment" style="display:none" onchange="saveMaintPhoto(\''+esc(e.id)+'\',this)"></label>'
       +'</div></div>';
    }).join("");
  });
  return h;
}
window.setFleetView=function(view){
  fleetView=view;
  render();
  window.scrollTo(0,0);
  setTimeout(()=>say(annieContextLine()),300);
};
window.toggleMaint=async function(id,field){
  const key=fridayKey();
  const s=Object.assign({},maintenanceState(id));
  if(s.week!==key){s.week=key;s.checked=false;s.verified=false;s.photo="";s.photoAt="";}
  if(field==="verified"&&!s.checked){toast("Crew check comes first");return;}
  s[field]=!s[field];
  if(field==="checked"&&!s.checked)s.verified=false;
  db.maintenance[id]=s;
  await saveDB();if(LIVE_CONNECTED)await api('/api/state',{method:'POST',body:JSON.stringify({action:'maintenance',equipmentId:id,weekOf:key,checked:s.checked,verified:s.verified,photo:s.photo||null})});render();toast(field==="verified"?"Verification updated":"Crew check updated");
};
window.saveMaintPhoto=function(id,input){
  const file=input.files&&input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=async()=>{
      const max=720, scale=Math.min(1,max/Math.max(img.width,img.height));
      const c=document.createElement("canvas");
      c.width=Math.max(1,Math.round(img.width*scale));
      c.height=Math.max(1,Math.round(img.height*scale));
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      const key=fridayKey();
      const s=Object.assign({},maintenanceState(id));
      if(s.week!==key){s.week=key;s.checked=false;s.verified=false;}
      s.photo=c.toDataURL("image/jpeg",.68);
      s.photoAt=new Date().toISOString();
      db.maintenance[id]=s;
      await saveDB();if(LIVE_CONNECTED)await api('/api/state',{method:'POST',body:JSON.stringify({action:'maintenance',equipmentId:id,weekOf:key,checked:s.checked,verified:s.verified,photo:s.photo})});render();toast("Maintenance photo saved");
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
};

  document.getElementById('hdate').textContent=fmtLong(new Date());
  const m=document.getElementById('main');
  if(screen==="TODAY")m.innerHTML=renderToday();
  else if(screen==="MASTER")m.innerHTML=renderMaster();
  else if(screen==="ESTIMATES")m.innerHTML=renderType("est","Estimates");
  else if(screen==="JOBS")m.innerHTML=renderJobs();
  else if(screen==="NOTES")m.innerHTML=renderNotes();
  else if(screen==="INBOX")m.innerHTML=renderInbox();
  else if(screen==="HOURS")m.innerHTML=renderHours();
  else if(screen==="MILEAGE")m.innerHTML=renderMileage();

    c.addEventListener('click',e=>{ if(e.target.closest('a'))return; openEdit(c.dataset.id); });

}

function clockMinutes(v){if(!v)return null;const p=v.split(':').map(Number);return p[0]*60+p[1];}
function calculateHours(start,end,breakMinutes){const a=clockMinutes(start),b=clockMinutes(end);if(a===null||b===null)return 0;let mins=b-a;if(mins<0)mins+=1440;return Math.max(0,(mins-(Number(breakMinutes)||0))/60);}

function titleCaseName(v){return String(v||'').trim().replace(/\b\w/g,c=>c.toUpperCase());}
function parseVoiceEstimate(transcript){
  const raw=String(transcript||'').trim();const lower=raw.toLowerCase();
  let name='';const nm=raw.match(/(?:estimate|quote)\s+for\s+(.+?)(?=\s+(?:got|has|with|at|there(?:'s| is)?|one|two|three|four|five|six|a|an)\b|$)/i);if(nm)name=titleCaseName(nm[1]);
  const moneyMatch=raw.match(/(?:\$|for\s+)?(\d{2,6}(?:\.\d{1,2})?)\s*$/i);const price=moneyMatch?Number(moneyMatch[1]):0;
  const counts={one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10};let count=1;for(const [w,n] of Object.entries(counts)){if(new RegExp('\\b'+w+'\\b','i').test(raw)){count=n;break;}}const digit=raw.match(/\b(\d+)\s+(?:tree|oak|elm|maple|pecan|pine|cedar|cypress)/i);if(digit)count=Number(digit[1]);
  const speciesList=['live oak','red oak','post oak','bur oak','oak','elm','pecan','maple','pine','cedar','cypress','hackberry','bradford pear','crape myrtle'];let species='tree';for(const sp of speciesList){if(lower.includes(sp)){species=sp;break;}}if(count!==1&&!species.endsWith('s'))species+='s';
  let location='on the property';for(const loc of ['front yard','back yard','rear yard','side yard','front of the house','back of the house','driveway','fence line']){if(lower.includes(loc)){location='in the '+loc;break;}}
  let service='Tree Care';let description='Review the dictated scope and complete the work description.';
  if(/prun|trim|canop|deadwood|epicormic|structure clearance|crown raise|raise/.test(lower)){
    service='Tree Pruning';
    description='Prune '+count+' '+species+' '+location+' in accordance with accepted arboricultural practices. Raise the canopy for appropriate clearance; establish clearance from the structure; remove dead, broken, rubbing, and defective branches as accessible; remove epicormic growth where appropriate; make proper branch-collar cuts; clean up and haul away all resulting debris.';
  }else if(/remove|take down|fell|removal/.test(lower)){
    service='Tree Removal';description='Remove '+count+' '+species+' '+location+'. Use controlled rigging and safe work practices as site conditions require. Cut stump as specified, clean up, and haul away resulting debris.';
  }else if(/stump|grind/.test(lower)){
    service='Stump Grinding';description='Grind the identified stump '+location+' to the agreed depth, remove excess grindings as specified, and leave the work area reasonably clean.';
  }else if(/mulch/.test(lower)){
    service='Mulching';description='Install arborist wood mulch at the specified tree or planting area. Maintain proper depth, keep mulch away from the trunk flare, and leave a clean finished edge.';
  }
  return {type:'est',name,service,desc:description,money:price?'$'+price.toFixed(2):'',status:'New',who:'Brandon',notes:'Voice transcript: '+raw,voiceTranscript:raw};
}
function startVoiceCapture(){
  const Recognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!Recognition){toast('Voice dictation is not supported in this browser. Open Arborwise OS in Chrome.');return;}
  const btn=document.getElementById('micBtn');const rec=new Recognition();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;
  rec.onstart=()=>{btn.classList.add('listening');say('Listening. Describe the customer, trees, location, work, and price.');};
  rec.onend=()=>btn.classList.remove('listening');
  rec.onerror=e=>{btn.classList.remove('listening');toast(e.error==='not-allowed'?'Microphone permission was denied':'I could not hear that clearly. Try again.');};
  rec.onresult=e=>{const text=e.results[0][0].transcript;openNewRecord(parseVoiceEstimate(text));};
  rec.start();
}
document.getElementById('micBtn').addEventListener('click',startVoiceCapture);

async function runManualSync(skipConnectionCheck=false){
  const b=document.getElementById('syncBtn');b.disabled=true;b.style.transform='rotate(180deg)';
  try{
    const c=await loadConnections();
    const anyAuthorized=Boolean(c?.quickbooks?.authorized||c?.google?.authorized);
    if(!skipConnectionCheck&&!anyAuthorized){
      openConnections(c);
      toast('Arborwise OS has no authorized data source yet. QuickBooks in ChatGPT is a separate connection.');
      return;
    }
    const r=await api('/api/sync',{method:'POST'});await loadLive(true);
    const qb=r.summary?.quickbooks||{},g=r.summary?.google||{};
    const parts=[];
    if(qb.status==='success')parts.push((qb.estimates||0)+' QB estimates');
    if(g.status==='success')parts.push((g.sheetRecords||0)+' Sheet records');
    if(parts.length){toast('Updated: '+parts.join(' • '));}
    else if(qb.status==='not_connected'&&g.status==='not_connected'){
      toast('Nothing synchronized: connect QuickBooks or Google inside Arborwise OS.');
      setTimeout(()=>openConnections(c),500);
    }else{
      const errors=[qb.error,g.error].filter(Boolean);
      toast(errors.length?errors.join(' • '):'No new records were available');
    }
    if(qb.status==='error'||g.status==='error')setTimeout(async()=>openConnections(await loadConnections()),800);
  }catch(e){if(e.status===401)showLogin();else toast(e.message)}
  finally{b.disabled=false;b.style.transform='';}
}

function pickLine(lines){

}

}
function itemWords(it){
  return [it.type,it.service,it.desc,it.notes,it.status,it.who,it.name].join(" ").toLowerCase();
}
function annieContextLine(){
  if(screen==="MILEAGE"&&fleetView==="maintenance"){
    const due=equipmentList().filter(e=>{const s=maintenanceState(e.id);return !(s.week===fridayKey()&&s.checked);});
    if(due.some(e=>/chainsaw|saw/i.test(e.name)))return "You call that sharp? You couldn't cut through butter with that chain! Friday checks are still due.";
    if(due.some(e=>/trailer/i.test(e.name)))return "Check the trailer brakes, lights, tires, hitch, chains and doors before it leaves the yard.";
    return due.length?due.length+" maintenance checks are still due Friday. Tools take care of us when we take care of them.":"Friday maintenance is checked. Brandon still needs to verify anything not signed off.";
  }
  if(screen==="MILEAGE"&&fleetView==="mileage")return pickLine(["Log the trip while you still remember where the hell you went.","Mileage belongs in the board, not on a crumpled receipt in the truck."]);
  const shown=visibleContextItems().filter(i=>!i.closed&&!isDone(i.status));
  const first=shown[0];
  const all=shown.map(itemWords).join(" ");

  const brandonEstimate=shown.find(i=>i.type==="est"&&/brandon/i.test(i.who||""));
  if(brandonEstimate || (screen==="ESTIMATES" && filter==="Brandon")){
    return pickLine([
      "Add 10%. Have you seen fucking costs lately?!",

      "Before you send that estimate, check access, equipment, haul-off, and risk."
    ]);

  if(/trailer|dump|haul|debris|brush load|chip dump/.test(all)){
    return pickLine([
      "Make sure those trailer doors are open before you dump that trailer.",
      "Check the hitch, chains, lights, tires, and doors before that trailer moves."
    ]);
  }

  if(/removal|remove|take ?down|fell|felling|dismantle/.test(all)){
    return pickLine([
      "Make sure you get that drop zone clear before you start that removal.",
      "Confirm the drop zone, escape path, rigging plan, and crew positions before the first cut.",
      "You call that sharp? You couldn't cut through butter with that chain!"
    ]);
  }

  if(/prun|trim|deadwood|crown clean|crown raise|limb/.test(all)){
    return pickLine([
      "Make sure you're using proper cuts on those limbs. No stubs and no flush cuts.",
      "Check your target, branch collar, rope path, and landing zone before that pruning cut.",
      "You call that sharp? You couldn't cut through butter with that chain!"
    ]);
  }

  if(/stump|grind/.test(all)){

      "Check access, rocks, metal, irrigation, and utilities before you start grinding.",

  if(/phc|plant health|disease|fungus|insect|treat|diagnos|fertiliz/.test(all)){

function say(t){
  bubble.textContent=t;
  bubble.style.display='block';
  clearTimeout(bubbleTimer);
  bubbleTimer=setTimeout(()=>bubble.style.display='none',6500);
}
bubble.addEventListener('click',()=>bubble.style.display='none');
document.getElementById('annie').addEventListener('click',()=>say(annieContextLine()));
(function greet(){
  const h=new Date().getHours();
  const greeting=h<5?"Burning the midnight oil? Hoo needs sleep... you do.":h<12?"Mornin'. Let's see what the board says.":h<17?"Afternoon check-in.":"Evenin'. Let's make tomorrow easier.";
  {
  const key = "annieScreenChanges";
  const count = Number(sessionStorage.getItem(key) || 0) + 1;
  sessionStorage.setItem(key, String(count));
  if (count % 10 === 0) setTimeout(() => say(greeting + " " + annieContextLine()), 900);
}
})();
loadDB();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}
const connectedProvider=new URLSearchParams(location.search).get('connected');if(connectedProvider){history.replaceState({},'',location.pathname);setTimeout(async()=>{toast(connectedProvider+' connected');await loadLive(true);},500);}
