<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#17402b">
  <title>Arborwise OS</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/assets/annie-icon-192.png">
  <link rel="apple-touch-icon" href="/assets/annie-icon-192.png">
  <link rel="stylesheet" href="/app.css?v=21">
</head>
<body>
<header>
  <button id="syncButton" class="sync" type="button" aria-label="Refresh Arborwise operations board">
    <span class="syncIcon">↻</span><span>REFRESH</span>
  </button>
  <img class="logo" src="/assets/arborwise-logo.png?v=21" alt="Arborwise — Nurture Your Nature —">
  <div id="dateLine" class="dateLine"></div>
  <button id="statusButton" class="status" type="button">OPERATIONS BOARD • QUICKBOOKS CONNECTION PAUSED</button>
</header>
<section id="filters" class="filters" aria-label="Employee and crew filters"></section>
<main id="main"></main>
<button id="addButton" class="add" type="button" aria-label="Add item">+</button>
<button id="annieButton" class="annie" type="button" aria-label="Ask Annie"><img src="/assets/annie-main-icon.png" alt="Annie"></button>
<div id="annieBubble" class="bubble" hidden></div>
<nav id="tabs" aria-label="Arborwise sections"></nav>
<div id="veil" class="veil" hidden><section id="sheet" class="sheet" role="dialog" aria-modal="true"></section></div>
<div id="toast" class="toast" hidden></div>
<script src="/app.js?v=21" defer></script>
<script src="/operational-overrides.js?v=21" defer></script>
<script src="/contact-actions.js?v=21" defer></script>
<script src="/runtime-fixes.js?v=21" defer></script>
</body>
</html>
