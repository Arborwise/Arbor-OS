name: Recover Vercel production after rate limit

on:
  workflow_dispatch:
  schedule:
    - cron: '23 * * * *'

permissions:
  contents: write

concurrency:
  group: vercel-production-recovery
  cancel-in-progress: false

jobs:
  recover:
    if: github.repository == 'Arborwise/Arbor-OS'
    runs-on: ubuntu-latest
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check whether board 51 is already live
        id: live
        shell: bash
        run: |
          set -euo pipefail
          BASE='https://arborwise-os.vercel.app'
          BUST="recovery-$(date +%s)"
          code=$(curl -sS -L --connect-timeout 10 --max-time 30 -o /tmp/board.html -w '%{http_code}' -H 'Cache-Control: no-cache' "$BASE/board-now.html?board=51&$BUST" || true)
          if [[ "$code" == '200' ]] \
            && grep -Fq '/board-current-51.js?board=51' /tmp/board.html \
            && grep -Fq '/daily-brief-51.js?board=51' /tmp/board.html \
            && grep -Fq '/weather-chip-48.js?board=51' /tmp/board.html \
            && grep -Fq 'id="weatherChip"' /tmp/board.html \
            && grep -Fq 'NURTURE YOUR NATURE' /tmp/board.html; then
            echo 'live=true' >> "$GITHUB_OUTPUT"
            echo 'Board 51 is already live. No deployment retry needed.'
          else
            echo 'live=false' >> "$GITHUB_OUTPUT"
            echo "Board 51 is not live yet; production returned $code."
          fi

      - name: Respect the rate-limit cooldown
        id: cooldown
        if: steps.live.outputs.live != 'true'
        shell: bash
        run: |
          set -euo pipefail
          now=$(date +%s)
          latest_commit=$(git log -1 --format=%ct)
          marker='public/deploy-recovery-marker.txt'
          if [[ -f "$marker" ]]; then
            last_attempt=$(sed -n 's/^epoch=//p' "$marker" | head -n 1)
            last_attempt=${last_attempt:-0}
            minimum_wait=21600
            reason='six-hour retry spacing'
          else
            last_attempt=$latest_commit
            minimum_wait=3900
            reason='initial Vercel one-hour reset window'
          fi
          age=$((now-last_attempt))
          if (( age >= minimum_wait )); then
            echo 'eligible=true' >> "$GITHUB_OUTPUT"
            echo "Cooldown complete: $reason."
          else
            remaining=$((minimum_wait-age))
            echo 'eligible=false' >> "$GITHUB_OUTPUT"
            echo "Cooldown still active for about $remaining seconds; leaving production alone."
          fi

      - name: Trigger one controlled Vercel retry
        if: steps.live.outputs.live != 'true' && steps.cooldown.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          epoch=$(date +%s)
          stamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          printf 'epoch=%s\nutc=%s\nreason=controlled retry after Vercel build-rate limit\n' "$epoch" "$stamp" > public/deploy-recovery-marker.txt
          git config user.name 'Arborwise deployment recovery'
          git config user.email 'actions@users.noreply.github.com'
          git add public/deploy-recovery-marker.txt
          git commit -m 'Retry production after Vercel rate-limit cooldown'
          git push origin HEAD:main

      - name: Wait for board 51 and verify production result
        if: steps.live.outputs.live != 'true' && steps.cooldown.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BASE='https://arborwise-os.vercel.app'
          for attempt in $(seq 1 40); do
            bust="verify-$(date +%s)-$attempt"
            code=$(curl -sS -L --connect-timeout 10 --max-time 30 -o /tmp/board.html -w '%{http_code}' -H 'Cache-Control: no-cache' "$BASE/board-now.html?board=51&$bust" || true)
            if [[ "$code" == '200' ]] \
              && grep -Fq '/board-current-51.js?board=51' /tmp/board.html \
              && grep -Fq '/daily-brief-51.js?board=51' /tmp/board.html \
              && grep -Fq '/weather-chip-48.js?board=51' /tmp/board.html \
              && grep -Fq 'id="weatherChip"' /tmp/board.html \
              && grep -Fq 'NURTURE YOUR NATURE' /tmp/board.html; then
              curl -sS -L -H 'Cache-Control: no-cache' "$BASE/board-current-51.js?$bust" -o /tmp/current.js
              curl -sS -L -H 'Cache-Control: no-cache' "$BASE/daily-brief-51.js?$bust" -o /tmp/daily.js
              curl -sS -L -H 'Cache-Control: no-cache' "$BASE/weather-chip-48.js?$bust" -o /tmp/weather.js
              grep -Fq "address:'3116 Lucia Way, Princeton, TX'" /tmp/current.js
              grep -Fq "completionType:'arborwise'" /tmp/current.js
              grep -Fq "address:'3016 Isla Terrace, Princeton, TX'" /tmp/current.js
              grep -Fq "who:'Homeowner',status:'Homeowner Completed'" /tmp/current.js
              grep -Fq "completionType:'homeowner',laborCost:0,otherCost:280.13" /tmp/current.js
              grep -Fq "label:'HOMEOWNER COMPLETED'" /tmp/daily.js
              grep -Fq 'Arborwise completed' /tmp/daily.js
              grep -Fq 'homeowner completed' /tmp/daily.js
              grep -Fq 'api.open-meteo.com/v1/forecast' /tmp/weather.js
              grep -Fq 'Van Alstyne, Texas' /tmp/weather.js
              grep -Fq 'Arborwise operations are unaffected' /tmp/weather.js
              echo 'Board 51 is live and passed attribution, cost-separation, and Van Alstyne weather checks.'
              exit 0
            fi
            echo "Waiting for controlled deployment; attempt $attempt returned $code."
            sleep 15
          done
          echo 'Controlled deployment did not become live during the verification window.'
          exit 1
