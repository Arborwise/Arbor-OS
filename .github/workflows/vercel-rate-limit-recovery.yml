name: Recover Vercel production after rate limit

on:
  workflow_dispatch:
  schedule:
    - cron: '23 * * * *'

permissions:
  contents: write

concurrency:
  group: vercel-production-recovery
  cancel-in-progress: false

jobs:
  recover:
    if: github.repository == 'Arborwise/Arbor-OS'
    runs-on: ubuntu-latest
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check whether protected board 54 is already live
        id: live
        shell: bash
        run: |
          set -euo pipefail
          BASE='https://arborwise-os.vercel.app'
          BUST="recovery-$(date +%s)"
          code=$(curl -sS -L --connect-timeout 10 --max-time 30 -o /tmp/board.html -w '%{http_code}' -H 'Cache-Control: no-cache' "$BASE/board-now.html?board=54&$BUST" || true)
          api_code=$(curl -sS -L --connect-timeout 10 --max-time 30 -o /tmp/board-api.json -w '%{http_code}' -H 'Cache-Control: no-cache' "$BASE/api/board" || true)
          if [[ "$code" == '200' ]] \
            && [[ "$api_code" == '401' ]] \
            && grep -Fq '/board-live-54.js?board=54' /tmp/board.html \
            && grep -Fq '/weather-chip-48.js?board=54' /tmp/board.html \
            && grep -Fq 'NURTURE YOUR NATURE' /tmp/board.html \
            && ! grep -Fq '/board-current-' /tmp/board.html \
            && ! grep -Fq '/board-live.js' /tmp/board.html; then
            echo 'live=true' >> "$GITHUB_OUTPUT"
            echo 'Protected board 54 is already live. No deployment retry needed.'
          else
            echo 'live=false' >> "$GITHUB_OUTPUT"
            echo "Board 54 is not fully live yet; board=$code protected-api=$api_code."
          fi

      - name: Respect the Vercel rate-limit cooldown
        id: cooldown
        if: steps.live.outputs.live != 'true'
        shell: bash
        run: |
          set -euo pipefail
          now=$(date +%s)
          latest_commit=$(git log -1 --format=%ct)
          marker='public/deploy-recovery-marker.txt'
          if [[ -f "$marker" ]]; then
            last_attempt=$(sed -n 's/^epoch=//p' "$marker" | head -n 1)
            last_attempt=${last_attempt:-0}
            minimum_wait=21600
            reason='six-hour retry spacing'
          else
            last_attempt=$latest_commit
            minimum_wait=3900
            reason='initial Vercel one-hour reset window'
          fi
          age=$((now-last_attempt))
          if (( age >= minimum_wait )); then
            echo 'eligible=true' >> "$GITHUB_OUTPUT"
            echo "Cooldown complete: $reason."
          else
            remaining=$((minimum_wait-age))
            echo 'eligible=false' >> "$GITHUB_OUTPUT"
            echo "Cooldown still active for about $remaining seconds; leaving production alone."
          fi

      - name: Trigger one controlled Vercel retry
        if: steps.live.outputs.live != 'true' && steps.cooldown.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          epoch=$(date +%s)
          stamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          printf 'epoch=%s\nutc=%s\nreason=controlled retry for protected live Sheet board\n' "$epoch" "$stamp" > public/deploy-recovery-marker.txt
          git config user.name 'Arborwise deployment recovery'
          git config user.email 'actions@users.noreply.github.com'
          git add public/deploy-recovery-marker.txt
          git commit -m 'Retry protected live board after Vercel cooldown'
          git push origin HEAD:main

      - name: Verify the controlled production result
        if: steps.live.outputs.live != 'true' && steps.cooldown.outputs.eligible == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BASE='https://arborwise-os.vercel.app'
          for attempt in $(seq 1 40); do
            bust="verify-$(date +%s)-$attempt"
            board_code=$(curl -sS -L --connect-timeout 10 --max-time 30 -o /tmp/board.html -w '%{http_code}' -H 'Cache-Control: no-cache' "$BASE/board-now.html?board=54&$bust" || true)
            api_code=$(curl -sS -L --connect-timeout 10 --max-time 30 -o /tmp/board-api.json -w '%{http_code}' -H 'Cache-Control: no-cache' "$BASE/api/board" || true)
            if [[ "$board_code" == '200' ]] \
              && [[ "$api_code" == '401' ]] \
              && grep -Fq '/board-live-54.js?board=54' /tmp/board.html \
              && grep -Fq '/annie-bubble-48.js?board=54' /tmp/board.html \
              && grep -Fq '/weather-chip-48.js?board=54' /tmp/board.html \
              && grep -Fq 'NURTURE YOUR NATURE' /tmp/board.html \
              && ! grep -Fq '/board-current-' /tmp/board.html; then
              curl -sS -L --connect-timeout 10 --max-time 30 -H 'Cache-Control: no-cache' "$BASE/board-live-54.js?$bust" -o /tmp/live.js
              curl -sS -L --connect-timeout 10 --max-time 30 -H 'Cache-Control: no-cache' "$BASE/board-live.js?$bust" -o /tmp/retired.js
              curl -sS -L --connect-timeout 10 --max-time 30 -H 'Cache-Control: no-cache' "$BASE/weather-chip-48.js?$bust" -o /tmp/weather.js
              grep -Fq '/api/board' /tmp/live.js
              grep -Fq 'STALE • LAST GOOD' /tmp/live.js
              grep -Fq 'Read-only • Source:' /tmp/live.js
              grep -Fq 'ARBORWISE_RETIRED_BOARD_DATA' /tmp/retired.js
              grep -Fq 'Van Alstyne, Texas' /tmp/weather.js
              if grep -Eq 'Christi Mahon|Susan Garrison|Dana & Tom Pierson|3116 Lucia Way' /tmp/board.html /tmp/live.js; then
                echo 'Public board assets contain embedded customer data.'
                exit 1
              fi
              echo 'Protected board 54 is live and passed refresh, stale-state, privacy, weather, brand, and retired-snapshot checks.'
              exit 0
            fi
            echo "Waiting for controlled deployment; attempt $attempt returned board=$board_code protected-api=$api_code."
            sleep 15
          done
          echo 'Controlled deployment did not become live during the verification window.'
          exit 1
