name: Production smoke test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate current code
        run: |
          npm install --no-audit --no-fund
          npm run check
          node --check public/board-current-51.js
          node --check public/daily-brief-51.js
          node --check public/annie-bubble-48.js
          node --check public/weather-chip-48.js
          node --check public/arborwise-personality-48.js
      - name: Wait for board 51 and verify production truth
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BASE='https://arborwise-os.vercel.app'
          BUST="${GITHUB_SHA}-$(date +%s)"
          live=false
          for attempt in $(seq 1 40); do
            code=$(curl -sS -L --connect-timeout 10 --max-time 30 -o /tmp/board.html -w '%{http_code}' -H 'Cache-Control: no-cache' "$BASE/board-now.html?board=51&smoke=$BUST-$attempt" || true)
            if [[ "$code" == '200' ]] \
              && grep -Fq '/board-current-51.js?board=51' /tmp/board.html \
              && grep -Fq '/daily-brief-51.js?board=51' /tmp/board.html \
              && grep -Fq '/live-sync-45.js?board=51' /tmp/board.html \
              && grep -Fq '/plan-b-refresh-46.js?board=51' /tmp/board.html \
              && grep -Fq '/weather-chip-48.js?board=51' /tmp/board.html \
              && grep -Fq 'id="weatherChip"' /tmp/board.html \
              && grep -Fq 'NURTURE YOUR NATURE' /tmp/board.html; then
              live=true
              break
            fi
            echo "Waiting for board 51; attempt $attempt returned $code."
            sleep 10
          done

          if [[ "$live" != 'true' ]]; then
            status_json=$(curl -sS --connect-timeout 10 --max-time 30 \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/status" || true)
            if grep -Fq 'upgradeToPro=build-rate-limit' <<<"$status_json"; then
              echo '::notice title=Vercel quota cooldown::Code validation passed. Board 51 is deferred to the controlled recovery workflow.'
              exit 0
            fi
            echo 'Board 51 did not deploy and no Vercel rate-limit status was found.'
            cat /tmp/board.html || true
            exit 1
          fi

          curl -sS -L -H 'Cache-Control: no-cache' "$BASE/board-current-51.js?$BUST" -o /tmp/current.js
          curl -sS -L -H 'Cache-Control: no-cache' "$BASE/daily-brief-51.js?$BUST" -o /tmp/daily.js
          curl -sS -L -H 'Cache-Control: no-cache' "$BASE/weather-chip-48.js?$BUST" -o /tmp/weather.js
          curl -sS -L -H 'Cache-Control: no-cache' "$BASE/board-manifest.webmanifest?v=51&$BUST" -o /tmp/manifest.json

          grep -Fq "address:'3116 Lucia Way, Princeton, TX'" /tmp/current.js
          grep -Fq "status:'Completed'" /tmp/current.js
          grep -Fq "completionType:'arborwise'" /tmp/current.js
          grep -Fq "address:'3016 Isla Terrace, Princeton, TX'" /tmp/current.js
          grep -Fq "who:'Homeowner',status:'Homeowner Completed'" /tmp/current.js
          grep -Fq "completionType:'homeowner',laborCost:0,otherCost:280.13" /tmp/current.js
          grep -Fq 'Arborwise crew did not perform the work' /tmp/current.js

          grep -Fq "label:'COMPLETED'" /tmp/daily.js
          grep -Fq "label:'HOMEOWNER COMPLETED'" /tmp/daily.js
          grep -Fq 'Arborwise completed' /tmp/daily.js
          grep -Fq 'homeowner completed' /tmp/daily.js
          grep -Fq 'record.address' /tmp/daily.js
          grep -Fq 'rank:90' /tmp/daily.js
          grep -Fq 'rank:91' /tmp/daily.js
          grep -Fq 'TODAY + 7 DAYS' /tmp/daily.js
          if grep -Fq "label:'SCHEDULE'" /tmp/daily.js; then
            echo 'Accepted unscheduled work is still counted as due today.'
            exit 1
          fi

          grep -Fq 'api.open-meteo.com/v1/forecast' /tmp/weather.js
          grep -Fq 'Van Alstyne, Texas' /tmp/weather.js
          grep -Fq "cache:'no-store'" /tmp/weather.js
          grep -Fq 'Arborwise operations are unaffected' /tmp/weather.js

          grep -Fq 'board=51' /tmp/manifest.json
          grep -Fq '#1D4B34' /tmp/manifest.json

          health=$(curl -sS -L --connect-timeout 10 --max-time 30 "$BASE/api/health")
          grep -q '"ok":true' <<<"$health"
          echo 'Board 51 passed completion attribution, cost separation, Van Alstyne weather, rolling-date, brand, and health checks.'
