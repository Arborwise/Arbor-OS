name: Production smoke test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment and test public routes
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://arborwise-os.vercel.app"

          wait_for_code() {
            local path="$1"
            local method="${2:-GET}"
            local expected="$3"
            local body="${4:-}"
            local code="000"
            for attempt in $(seq 1 40); do
              if [[ "$method" == "POST" ]]; then
                code=$(curl -sS -o /tmp/response.txt -w '%{http_code}' -X POST -H 'Content-Type: application/json' --data "$body" "$BASE$path" || true)
              else
                code=$(curl -sS -o /tmp/response.txt -w '%{http_code}' "$BASE$path" || true)
              fi
              if [[ ",$expected," == *",$code,"* ]]; then
                echo "PASS $method $path -> $code"
                return 0
              fi
              echo "Waiting for $method $path; got $code on attempt $attempt"
              sleep 10
            done
            echo "FAIL $method $path -> $code"
            cat /tmp/response.txt || true
            return 1
          }

          wait_for_code "/" GET "200"
          grep -q "Arborwise OS" /tmp/response.txt
          wait_for_code "/app.css?v=15" GET "200"
          wait_for_code "/app.js?v=15" GET "200"
          wait_for_code "/operational-overrides.js?v=15" GET "200"
          wait_for_code "/assets/arborwise-logo.png?v=15" GET "200"
          wait_for_code "/api/health" GET "200"
          wait_for_code "/api/connections" GET "401"
          wait_for_code "/api/data" GET "401"
          wait_for_code "/api/sync" GET "401"
          wait_for_code "/api/login" POST "401" '{"pin":"smoke-test-invalid"}'
          wait_for_code "/api/oauth/google/start" GET "401"
          wait_for_code "/api/oauth/quickbooks/start" GET "401"
          wait_for_code "/api/records" GET "405"
          wait_for_code "/api/state" GET "405"
